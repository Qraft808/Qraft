<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qraft - Generate Practice Questions Instantly</title>

<meta name="description"
content="Any Topic. Any Question Type. Generate MCQs, Short Answers, Long Answers and Case Studies instantly with Qraft.">

content="Qraft, Practice Questions, MCQ Generator, Case Study Questions, Short Answer Questions, Long Answer Questions, Exam Preparation">

<meta name="author" content="Qraft">

<meta property="og:title"
content="Qraft - Generate Practice Questions Instantly">

<meta property="og:description"
content="Any Topic. Any Question Type. Generate practice questions instantly with Qraft.">

<meta property="og:type"
content="website">

<meta property="og:image"
content="favicon.png">

<link rel="canonical"
href="https://qraft808.github.io/Qraft/">

<link rel="icon"

href="style.css">

<body>

<header>

<h1 class="logo">

<span class="q">Q</span><span class="raft">raft</span>

</h1>

<p class="tagline">

Any Topic. Any Question Type.

</p>

<p class="subtagline">

Generate Practice Questions Instantly.

</p>

</header>


<div class="container">

<input
type="text"
id="prompt"
placeholder="Try:

Physics Electrostatics

Chemistry Chemical Bonding

Biology Genetics">


<h2>

Question Type

</h2>


<div class="question-types">

<button class="type-btn">

MCQ

</button>


<button class="type-btn">

Short Answer

</button>


<button class="type-btn">

Long Answer

</button>


<button class="type-btn">

Case Study

</button>


<button class="type-btn">

Assertion-Reason

</button>

</div>



<h2>

No. of Questions

</h2>


<div class="question-count">

<button class="count-btn">

5

</button>


<button class="count-btn">

10

</button>


<button class="count-btn">

20

</button>


<button class="count-btn">

Custom

</button>

</div>



<button id="generateBtn">

✨ Generate Questions

</button>



<div id="output">

<!-- Questions will appear here -->

</div>


</div>



<footer>

© 2026 Qraft
